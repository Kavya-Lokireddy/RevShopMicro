<div class="product-form-card">
  <h3>{{ form.id ? 'Edit Product' : 'Add New Product' }}</h3>

  <div class="product-form-grid">
    <div class="field full">
      <label>Name</label>
      <input [(ngModel)]="form.name" placeholder="Product Name">
    </div>

    <div class="field">
      <label>Category ID</label>
      <input type="number" [(ngModel)]="form.categoryId" placeholder="Enter category ID">
    </div>

    <div class="field">
      <label>Quantity</label>
      <input type="number" [(ngModel)]="form.quantity">
    </div>

    <div class="field full">
      <label>Description</label>
      <textarea [(ngModel)]="form.description" placeholder="Description"></textarea>
    </div>

    <div class="field">
      <label>Price</label>
      <input type="number" [(ngModel)]="form.price">
    </div>

    <div class="field">
      <label>MRP</label>
      <input type="number" [(ngModel)]="form.mrp">
    </div>

    <div class="field">
      <label>Discount %</label>
      <input type="number" [(ngModel)]="form.discountPercentage">
    </div>

    <div class="field">
      <label>Stock Threshold</label>
      <input type="number" [(ngModel)]="form.stockThreshold">
    </div>
  </div>

  <div class="category-help" *ngIf="categories.length > 0">
    <p class="category-help-title">Available Categories (use ID in Category ID field):</p>
    <div class="category-chip-list">
      <span class="category-chip" *ngFor="let c of categories">#{{ c.id }} - {{ c.name }}</span>
    </div>
  </div>

  <p class="category-help-error" *ngIf="categoriesLoadFailed">
    Could not load categories. Enter the Category ID manually.
  </p>

  <button class="save-btn" (click)="save()">{{ form.id ? 'Update Product' : 'Add Product' }}</button>
</div>
